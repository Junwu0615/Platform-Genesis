services:
  powa-postgres:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5431:5432'
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - powa_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements,powa
      -c pg_stat_statements.track=all
      -c track_io_timing=on
    networks:
      powa-net:
        aliases:
          - powa-repository
    restart: unless-stopped

  powa-web:
    image: powateam/powa-web:${POWA_UI_VERSION:-latest}
    ports:
      - '8888:8888'
    env_file:
      - .env
    environment:
      POWA_DB_HOST: powa-postgres
      POWA_DB_PORT: 5432
      POWA_DB_NAME: ${POSTGRES_DB}
      POWA_DB_USER: ${POWA_DB_USER}
      POWA_DB_PASSWORD: ${POWA_DB_PASSWORD}
      POWA_SERVER_HOST: powa-postgres
      POWA_SERVER_PORT: 5432
      POWA_SERVER_DBNAME: ${POSTGRES_DB}
#      POWA_REPOSITORY: powa-postgres
    depends_on:
      - powa-postgres
    networks:
      - powa-net
    restart: unless-stopped


volumes:
  powa_data:

networks:
  powa-net:
    driver: bridge