# ansible/deploy_config.yml

- name: Dynamic Monitoring Configuration
  hosts: localhost
  vars:
    postgres_exporter_host: 'host.docker.internal'
    node_exporter_host: 'host.docker.internal'
    config_path: '{{ playbook_dir }}/../docker/monitoring/prometheus.yaml'

  tasks:
    - name: Render Prometheus Configuration
      template:
        src: templates/prometheus.yml.j2
        dest: '{{ config_path }}'

    - name: Restart Prometheus to load new config
      community.docker.docker_container:
        name: ooud-cluster-prometheus-1
        state: started
        restart: yes
      tags: reload