version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: powa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: powa
    ports:
      - '5431:5432'
    volumes:
      - powa_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements,powa
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_io_timing=on

  powa-web:
    image: powateam/powa-web:latest
    container_name: powa-web
    depends_on:
      - postgres
    ports:
      - '8888:8888'
    environment:
      POWA_SERVER_HOST: postgres
      POWA_SERVER_PORT: 5432
      POWA_SERVER_DBNAME: powa

volumes:
  powa_data: