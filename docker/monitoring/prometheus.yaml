# ansible/templates/prometheus.yml.j2

global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['ooud-cluster-postgres_exporter-1:9187']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['ooud-cluster-node_exporter-1:9100']