# 定義來源格式
input {
  tcp {
    port => 5000
    codec => json # 自動把 Python 傳來的 metadata 轉成欄位
  }
}

# 日誌分類
filter {
  # 1. 如果 Python 沒傳 app_name，給一個預設值防止歸類失敗
  if ![app_name] {
    mutate { add_field => { "app_name" => "unknown_python_app" } }
  }

  # 2. 自動修正索引名稱（選用）
  # 透過 app_name 來決定要把日誌存在哪個索引，方便管理
  mutate {
    lowercase => [ "app_name" ]
  }
}

# 定義輸出索引
output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # 最佳實踐：按 app_name 拆分索引，這樣刪除舊資料時可以按 APP 刪
    index => "logs-%{[app_name]}-%{+YYYY.MM.dd}"
  }

  # 除錯用，可以在 docker logs 看到拆解後的欄位
  stdout { codec => rubydebug }
}